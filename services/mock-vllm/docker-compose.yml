version: '3.8'

services:
  mock-vllm:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MOCK_PROCESSING_DELAY=0.1
      - VLLM_API_KEY=${VLLM_API_KEY:-}
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--model"
      - "mock-gpt-3.5-turbo"
      - "--served-model-name"
      - "gpt-3.5-turbo"
      - "gpt-4"
      - "text-embedding-ada-002"
    restart: unless-stopped