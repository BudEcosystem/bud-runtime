# AIBrix Deployment with Redis
# This is a static example deployment. For building from source, use build-aibrix.sh or build-aibrix-simple.sh
---
apiVersion: v1
kind: Namespace
metadata:
  name: aibrix-system
---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  namespace: aibrix-system
  labels:
    app: redis
spec:
  selector:
    matchLabels:
      app: redis
      role: master
      tier: backend
  replicas: 1
  template:
    metadata:
      labels:
        app: redis
        role: master
        tier: backend
    spec:
      containers:
      - name: master
        image: redis:7-alpine
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
        ports:
        - containerPort: 6379
---        
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: aibrix-system
  labels:
    app: redis
    role: master
    tier: backend
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
    role: master
    tier: backend
---
# AIBrix Controller Manager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aibrix-controller-manager
  namespace: aibrix-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aibrix-controller-manager
  template:
    metadata:
      labels:
        app: aibrix-controller-manager
    spec:
      containers:
      - name: manager
        image: k3d-bud-registry:5000/aibrix/controller-manager:latest  # Replace with your image tag
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: metrics
        - containerPort: 9443
          name: webhook
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
# AIBrix Gateway Plugins with Redis configuration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aibrix-gateway-plugins
  namespace: aibrix-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aibrix-gateway-plugins
  template:
    metadata:
      labels:
        app: aibrix-gateway-plugins
    spec:
      containers:
      - name: plugins
        image: k3d-bud-registry:5000/aibrix/gateway-plugins:latest  # Replace with your image tag
        imagePullPolicy: Always
        ports:
        - containerPort: 50051
          name: grpc
        env:
        - name: REDIS_HOST
          value: "redis-master"
        - name: REDIS_PORT
          value: "6379"
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
---
# Services
apiVersion: v1
kind: Service
metadata:
  name: aibrix-controller-manager
  namespace: aibrix-system
spec:
  selector:
    app: aibrix-controller-manager
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
  - name: webhook
    port: 9443
    targetPort: 9443
---
apiVersion: v1
kind: Service
metadata:
  name: aibrix-gateway-plugins
  namespace: aibrix-system
spec:
  selector:
    app: aibrix-gateway-plugins
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051