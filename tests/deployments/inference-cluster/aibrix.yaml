# AIBrix Test Deployment
# This is a placeholder deployment using nginx since the real AIBrix image is not available
---
apiVersion: v1
kind: Namespace
metadata:
  name: inference-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aibrix-test
  namespace: inference-system
  labels:
    app: aibrix
    component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aibrix
  template:
    metadata:
      labels:
        app: aibrix
        component: control-plane
    spec:
      containers:
        - name: aibrix
          image: nginx:latest  # Placeholder image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: PORT
              value: "80"
            - name: LOG_LEVEL
              value: "info"
          resources:
            limits:
              cpu: 500m
              memory: 1024Mi
            requests:
              cpu: 250m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aibrix-service
  namespace: inference-system
  labels:
    app: aibrix
    component: control-plane
spec:
  selector:
    app: aibrix
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 80
      name: http
  type: ClusterIP
---
# This service name matches what the inference-stack helm chart creates
# So tests can use the same service names
apiVersion: v1
kind: Service
metadata:
  name: inference-release-inference-stack-aibrix
  namespace: inference-system
  labels:
    app: aibrix
    component: control-plane
spec:
  selector:
    app: aibrix
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 80
      name: http
  type: ClusterIP