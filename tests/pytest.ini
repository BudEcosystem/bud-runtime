[pytest]
# pytest configuration

# Test discovery
testpaths = e2e integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --capture=no
    --maxfail=10
    --color=yes

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: marks tests that require GPU
    integration: marks integration tests
    smoke: marks smoke tests for quick validation
    load: marks load/performance tests
    failover: marks failover/resilience tests
    requires_model: marks tests that require specific models

# Timeout
timeout = 300
timeout_method = thread

# Asyncio
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning