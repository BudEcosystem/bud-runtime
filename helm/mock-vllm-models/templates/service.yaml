{{- range .Values.models }}
{{- if .enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    model.aibrix.ai/name: {{ .name }}
    {{- include "mock-vllm-models.labels" $ | nindent 4 }}
spec:
  type: {{ $.Values.service.type }}
  selector:
    model.aibrix.ai/name: {{ .name }}
  ports:
  - name: serve
    port: {{ $.Values.service.port }}
    targetPort: {{ $.Values.service.targetPort }}
    protocol: TCP
{{- end }}
{{- end }}