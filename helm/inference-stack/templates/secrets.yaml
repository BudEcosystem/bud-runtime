{{- if .Values.minio.secrets.create }}
---
# MinIO Credentials Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.minio.secrets.name }}
  namespace: {{ include "inference-stack.namespace" . }}
  labels:
    {{- include "inference-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  accessKey: {{ .Values.minio.accessKey }}
  secretKey: {{ .Values.minio.secretKey }}
{{- end }}
{{- if .Values.vllm.hfTokenSecret.create }}
---
# HuggingFace Token Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.vllm.hfTokenSecret.name }}
  namespace: {{ include "inference-stack.namespace" . }}
  labels:
    {{- include "inference-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.vllm.hfTokenSecret.token }}
{{- end }}