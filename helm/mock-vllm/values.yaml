# Default values for mock-vllm

replicaCount: 1

image:
  repository: mock-vllm
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mock-vllm.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Mock vLLM specific configuration
config:
  # Processing delay in seconds
  processingDelay: "0.1"
  
  # Model to serve
  model: "mock-gpt-3.5-turbo"
  
  # Model names to advertise
  servedModelNames:
    - "gpt-3.5-turbo"
    - "gpt-4"
    - "text-embedding-ada-002"
    - "llama-2-7b"
    - "mistral-7b"
  
  # API authentication
  apiKey: ""
  
  # Logging
  logLevel: "info"
  disableRequestLogging: false
  
  # FastAPI docs
  disableFastApiDocs: false
  
  # Metrics
  disableMetrics: false
  
  # CORS settings
  allowedOrigins:
    - "*"
  allowCredentials: false
  allowedMethods:
    - "*"
  allowedHeaders:
    - "*"

# Additional environment variables
env: []
  # - name: CUSTOM_ENV
  #   value: "custom-value"

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000