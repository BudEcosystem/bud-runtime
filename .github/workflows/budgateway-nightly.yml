name: "BudGateway: Nightly Image Release"

on:
  push:
    branches:
      - "master"
    paths:
      - "services/budgateway/**"
  workflow_dispatch:

env:
  IMAGE: budstudio/budgateway

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push platform image
        uses: docker/build-push-action@v5
        with:
          context: ./services/budgateway
          push: true
          file: ./services/budgateway/gateway/Dockerfile
          platforms: ${{ matrix.platform }}
          tags: ${{ env.IMAGE }}:nightly-${{ matrix.suffix }}

  manifest:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE }}:nightly \
            ${{ env.IMAGE }}:nightly-amd64 \
            ${{ env.IMAGE }}:nightly-arm64
