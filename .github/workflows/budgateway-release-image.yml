name: "BudGateway: Build and Push Docker Image on Release"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release version (e.g., 0.25.0)'
        required: true
        type: string

env:
  IMAGE: budstudio/budgateway

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push platform image
        uses: docker/build-push-action@v5
        with:
          context: ./services/budgateway
          push: true
          file: ./services/budgateway/gateway/Dockerfile
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.IMAGE }}:${{ inputs.release_tag }}-${{ matrix.suffix }}
            ${{ env.IMAGE }}:latest-${{ matrix.suffix }}

  manifest:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          docker manifest create ${{ env.IMAGE }}:${{ inputs.release_tag }} \
            ${{ env.IMAGE }}:${{ inputs.release_tag }}-amd64 \
            ${{ env.IMAGE }}:${{ inputs.release_tag }}-arm64
          docker manifest push ${{ env.IMAGE }}:${{ inputs.release_tag }}

          docker manifest create ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:latest-amd64 \
            ${{ env.IMAGE }}:latest-arm64
          docker manifest push ${{ env.IMAGE }}:latest
